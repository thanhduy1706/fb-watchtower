name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'yarn'

      - name: Install Dependencies
        run: yarn install --frozen-lockfile

      - name: Run Formatter Check
        run: yarn format:check

      - name: Run Linter
        run: yarn lint

      - name: Run Type Check
        run: npx tsc --noEmit

      - name: Run Tests
        run: yarn test
